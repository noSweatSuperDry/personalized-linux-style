conky.config = {
--==============================================================================

--  Created : 2022/Sep/02
--  This theme is for conky version 1.10.8 or newer
-- 
--  ARRAKIS
--  ( A part of Draco Conky themes pack )
--
--  author  : Closebox73
--  version : 2.6
--  variant : Playerctl & Celcius
--  license : Distributed under the terms of GPLv3

--==============================================================================

-- Size and Position settings --
  alignment = 'top_left',
  gap_x = -1900,
  gap_y = 20,
  maximum_width = 250,
  minimum_height = 600,
  minimum_width = 250,
  
-- Text settings --
  use_xft = true,
  override_utf8_locale = true,
  font = 'Barlow:size=3',
  
-- Color Settings --
  default_color = '#FDFEFD',
  default_outline_color = 'white',
  default_shade_color = 'white',
  color1 = '#DA5D2D',
  
-- Window Settings --
  background = false,
  border_width = 1,
  draw_borders = false,
  draw_graph_borders = true,
  draw_outline = false,
  draw_shades = false,
  own_window = true,
  own_window_colour = '000000',
  own_window_class = 'Conky',
  draw_blended = false,
  own_window_argb_visual = true,
  own_window_type = 'desktop',
  own_window_transparent = false,
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  stippled_borders = 0,
  
-- Others --
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  double_buffer = true,
  out_to_console = false,
  out_to_stderr = false,
  extra_newline = false,
  update_interval = 1,
  uppercase = false,
  use_spacer = 'none',
  show_graph_scale = false,
  show_graph_range = false,
}

conky.text = [[
${execi 300 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -g}\
${alignc}${voffset 0}${font Barlow:bold:size=12}[ ${color}${execi 6000 whoami | sed -e 's/\(.*\)/\U\1/'} ]
${alignr}${voffset 20}${font feather:size=40}${execi 15 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -i}${font}
${offset 0}${voffset -70}${font CrashNumberingGothic:bold:size=72}${time %I}${goto 120}${font Barlow:bold:size=11}${time %^p}${font}
${offset 0}${voffset -5}${font CrashNumberingGothic:bold:size=72}${time %M}${font}
${offset 115}${voffset -50}${color1}${font Barlow:bold:size=15}${time %B}${font}
${offset 115}${voffset 0}${font Barlow:size=15}${time %A}
${offset 0}${voffset 15}${color}${font Barlow:size=10}Weather in ${execi 100 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -n} is ${execi 100 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -m}. ${execi 100 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -t} °C
${offset 0}${voffset 0}${color}${font Barlow:size=10}Wind speed in your location is ${execi 100 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -ws}m/s
${offset 0}${voffset 0}${color}${font Barlow:size=10}And Humidity is ${execi 100 /home/nosweatsuperdry/.conky/Arrakis/scripts/weather-v4.0.sh -h}%.${font}
${alignc}${voffset -5}${font Barlow:size=23}--------------------------${font}
${offset 0}${voffset 0}${font Barlow:bold:size=12}Wi-Fi : ${execi 5 /home/nosweatsuperdry/.conky/Arrakis/scripts/ssid}
${offset 0}${voffset 2}${font Barlow:size=9}Down : ${downspeed enp3s0}${goto 120}Up : ${upspeed enp3s0}
${offset 0}${voffset 0}${color1}${downspeedgraph enp3s0 30,105}${alignr}${upspeedgraph enp3s0 30,105}
${alignc}${voffset -15}${color}${font Barlow:size=23}--------------------------${font}
${offset 0}${voffset 0}${color}${font Barlow:bold:size=12}System info
${offset 0}${voffset 3}${color}${font Barlow:size=10}CPU ${goto 42}>> ${cpu cpu0}%${alignr}${color1}${cpubar cpu0 13,130}
${offset 0}${voffset 0}${color}${font Barlow:size=10}RAM ${goto 42}>> ${memperc}%${alignr}${color1}${membar 13,130}
${offset 0}${voffset 0}${color}${font Barlow:size=10}GPU ${goto 42}>> ${execi 1 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader}${alignr}${color1}${execigraph 1 "nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader" 13,130}
${offset 0}${voffset 0}${color}${font Barlow:size=10}TEMP ${goto 42}>> ${execi 1 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}°C${alignr}${color1}${execigraph 1 "nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader" 13,130}

${alignc}${voffset -5}${color}${font Barlow:size=23}--------------------------${font}
${offset 0}${voffset 0}${color}${font Barlow:bold:size=12}Storage
${offset 0}${voffset 0}${color}${font Barlow:size=10}Home :
${offset 0}${voffset 3}${color1}${fs_bar 13,220 /home}
${offset 0}${voffset -2}${color}${font Barlow:italic:size=8}${fs_used /home} / ${fs_size /home}
