${offset 0}${voffset 3}${color1}${fs_bar 13,220 /mnt/OverDriveX}
${offset 0}${voffset -2}${color}${font Barlow:italic:size=8}${fs_used /mnt/OverDriveX} / ${fs_size /mnt/OverDriveX}
${offset 0}${voffset 3}${color}${font Barlow:size=10}CorruptedDriveX :
${offset 0}${voffset 3}${color1}${fs_bar 13,220 /mnt/CorruptedDriveX}
${offset 0}${voffset -2}${color}${font Barlow:italic:size=8}${fs_used /mnt/CorruptedDriveX} / ${fs_size /mnt/CorruptedDriveX}
${offset 0}${voffset 3}${color}${font Barlow:size=10}CodexDriveX :
${offset 0}${voffset 3}${color1}${fs_bar 13,220 /mnt/CodexDriveX}
${offset 0}${voffset -2}${color}${font Barlow:italic:size=8}${fs_used /mnt/CodexDriveX} / ${fs_size /mnt/CodexDriveX}
${offset 0}${voffset 3}${color}${font Barlow:size=9}- There are ${execi 6 /home/nosweatsuperdry/.conky/Arrakis/scripts/trash-info.sh -s} file in Trash
${alignc}${voffset -5}${color}${font Barlow:size=23}--------------------------${font}
${offset 0}${voffset 0}${color}${font Barlow:bold:size=12}Media Player
${color1}${offset 0}${voffset 1}${font Barlow:bold:size=11}${execi 1 /home/nosweatsuperdry/.conky/Arrakis/scripts/playerctl-info.sh -a}${font}
${color}${offset 0}${voffset 3}${font Barlow:italic:size=9}${execi 1 playerctl metadata xesam:title 2>/dev/null}${font}
${color}${offset 0}${voffset 5}${font Barlow:size=8}${execi 1 playerctl position --format "{{ duration(position) }}" 2>/dev/null}${goto 40}${color1}${execibar 1 /home/nosweatsuperdry/.conky/Arrakis/scripts/player-progress.sh}${font}
]]
